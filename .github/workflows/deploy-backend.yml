# YouTube Bulk Editor — GitHub Actions CI/CD
# Auto-deploys backend to Google Cloud Run on every push to main
#
# Copyright (c) 2025 Chirag Mehta
# github.com/imchikachirag/youtube-bulk-editor
#
# Required GitHub Secrets (set in repo Settings > Secrets):
#   GCP_PROJECT_ID       — your Google Cloud project ID
#   GCP_SA_KEY           — service account JSON key (base64 encoded)
#   GOOGLE_CLIENT_ID     — OAuth client ID
#   GOOGLE_CLIENT_SECRET — OAuth client secret
#   REDIRECT_URI         — production callback URL
#   FRONTEND_URL         — https://chiragmehta.info/youtube-bulk-editor

name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE:    youtube-bulk-editor-api
  REGION:     asia-south1

jobs:
  deploy:
    name: Deploy backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE:$GITHUB_SHA .
          docker push gcr.io/$PROJECT_ID/$SERVICE:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image gcr.io/$PROJECT_ID/$SERVICE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            --set-env-vars="GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --set-env-vars="REDIRECT_URI=${{ secrets.REDIRECT_URI }}" \
            --set-env-vars="FRONTEND_URL=${{ secrets.FRONTEND_URL }}" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=256Mi \
            --cpu=1 \
            --timeout=30s

      - name: Show deployed URL
        run: |
          gcloud run services describe $SERVICE \
            --region $REGION \
            --format='value(status.url)'
